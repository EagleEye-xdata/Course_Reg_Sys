{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>Welcome Back</h2>
        <p class="subtitle">Sign in to your student portal</p>

        <form method="POST" action="{{ url_for('auth.login') }}" id="login-form">
            <div class="mb-3">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" class="form-control" id="email" name="email" 
                       placeholder="you@university.edu" required autofocus>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password" 
                       placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary-custom" id="login-btn">
                <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
            </button>
        </form>

        <p class="text-center mt-4" style="color: var(--text-secondary); font-size: 0.9rem;">
            Don't have an account? 
            <a href="{{ url_for('auth.register') }}" style="font-weight: 600;">Create Account</a>
        </p>
    </div>
</div>
{% endblock %}
